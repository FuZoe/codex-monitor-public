<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: system-ui, sans-serif;
}
.stage {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
#character {
  max-width: 86%;
  max-height: 92%;
  object-fit: contain;
  transition: opacity 0.18s ease, transform 0.18s ease;
}
#character.switching {
  opacity: 0.25;
  transform: scale(0.96);
}
#fallback {
  display: none;
  color: #d7e1ee;
  font-size: 18px;
  text-align: center;
  padding: 12px 16px;
  border-radius: 8px;
  background: rgba(21, 25, 31, 0.72);
}
</style>
</head>
<body>
<div class="stage">
  <img id="character" src="clawd/gif/clawd-idle.gif" alt="Codex Status">
  <div id="fallback">待机</div>
</div>
<script>
var img = document.getElementById('character');
var fallback = document.getElementById('fallback');
var currentState = 'idle';

var stateToGif = {
  thinking: 'clawd/gif/clawd-thinking.gif',
  typing: 'clawd/gif/clawd-typing.gif',
  working: 'clawd/gif/clawd-typing.gif',
  building: 'clawd/gif/clawd-building.gif',
  tool_call: 'clawd/gif/clawd-building.gif',
  juggling: 'clawd/gif/clawd-juggling.gif',
  multi_session: 'clawd/gif/clawd-juggling.gif',
  sweeping: 'clawd/gif/clawd-sweeping.gif',
  compacting: 'clawd/gif/clawd-sweeping.gif',
  happy: 'clawd/gif/clawd-happy.gif',
  attention: 'clawd/gif/clawd-happy.gif',
  done: 'clawd/gif/clawd-happy.gif',
  error: 'clawd/gif/clawd-error.gif',
  idle: 'clawd/gif/clawd-idle.gif',
  sleeping: 'clawd/gif/clawd-sleeping.gif',
  disconnected: 'clawd/gif/clawd-sleeping.gif',
  notification: 'clawd/gif/clawd-notification.gif'
};

var stateLabels = {
  thinking: '思考中',
  typing: '写代码中',
  working: '写代码中',
  building: '构建中',
  tool_call: '执行工具',
  juggling: '多任务',
  multi_session: '多任务',
  sweeping: '整理中',
  compacting: '整理中',
  happy: '完成',
  attention: '完成',
  done: '完成',
  error: '出错',
  idle: '待机',
  sleeping: '休眠',
  disconnected: '断开连接',
  notification: '通知'
};

function showFallback(state) {
  img.style.display = 'none';
  fallback.style.display = 'block';
  fallback.textContent = stateLabels[state] || '待机';
}

function showImage() {
  img.style.display = 'block';
  fallback.style.display = 'none';
}

function setCodexState(state) {
  if (!stateToGif[state]) {
    state = 'idle';
  }
  if (state === currentState && img.style.display !== 'none') {
    return;
  }
  currentState = state;
  img.classList.add('switching');
  setTimeout(function() {
    img.onerror = function() { showFallback(state); };
    img.onload = function() {
      showImage();
      img.classList.remove('switching');
    };
    img.src = stateToGif[state];
  }, 100);
}

img.onerror = function() { showFallback(currentState); };
img.onload = function() { showImage(); };
</script>
</body>
</html>
